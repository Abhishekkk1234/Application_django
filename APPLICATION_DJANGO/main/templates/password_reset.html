{% extends 'base.html' %}

{% block content %}
<div class="card center-box">
    <h2 style="text-align:center;">Reset Password</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter your email" required>
        <button type="submit">Send Reset Link</button>
    </form>
</div>
{% endblock %}
